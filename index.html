<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 ADIPA - Acceso</title>
    <style>
        body { margin: 0; font-family: sans-serif; background: #1e1b4b; display: flex; align-items: center; justify-content: center; height: 100vh; color: white; }
        .login-box { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border-radius: 20px; padding: 50px; border: 1px solid rgba(255, 255, 255, 0.2); text-align: center; width: 350px; }
        .login-title { font-size: 32px; font-weight: 800; margin-bottom: 20px; }
        input { width: 100%; padding: 15px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.3); background: rgba(0,0,0,0.2); color: white; margin-bottom: 20px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #7c3aed; border: none; border-radius: 10px; color: white; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="login-title">🚀 ADIPA</div>
        <p>Dashboard Feb 2026</p>
        <input type="password" id="pass" placeholder="Contraseña">
        <button onclick="validar()">Acceder</button>
    </div>
    <script>
        function validar() {
            if (document.getElementById('pass').value === 'consejo') {
                // Si la clave es correcta, mostramos el contenido oculto
                window.location.hash = "dashboard";
                document.body.innerHTML = "<h1>Cargando Dashboard...</h1>";
                location.reload(); 
            } else { alert("Error"); }
        }
    </script>
</body>
</html>
